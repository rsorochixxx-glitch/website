<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Простая игра</title>
    <style>
        #game-box {
            width: 400px;
            height: 400px;
            border: 2px solid black;
            position: relative;
            background-color: #f0f0f0;
            overflow: hidden;
        }
        #target {
            width: 50px;
            height: 50px;
            background-color: blue;
            position: absolute;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Счет: <span id="score">0</span></h1>
    <div id="game-box">
        <div id="target"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
