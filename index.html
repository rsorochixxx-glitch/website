<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <a class="btn" id="btnClicker">Clicker</a>
    <a id="btnSnake" class="btn btn-secondary">Snake</a>
    <script>
        const tg = window.Telegram.WebApp;
        const chat_id, message_id = String(tg.initDataUnsafe.start_param).split('&');
        console.log(chat_id);
        console.log(message_id);
        document.getElementById('btnClicker').onclick = function() {
        location.href = `square/index.html?chat_id=${chat_id}`;
        };
        document.getElementById('btnSnake').onclick = function() {
            location.href = `snake/snake.html?chat_id=${chat_id}`;
        };
    </script>
</body>
</html>
